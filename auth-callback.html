<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SuperIsland — Signed in</title>
  <style>
    :root { color-scheme: dark; }
    html, body { height: 100%; margin: 0; }
    body {
      display: flex; align-items: center; justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: radial-gradient(1200px 800px at 50% -10%, #2a1a55 0%, #0c0a16 60%);
      color: #ECEAF6;
    }
    .card { text-align: center; padding: 44px 28px; max-width: 420px; }
    .check {
      width: 76px; height: 76px; border-radius: 50%;
      background: rgba(54, 211, 122, 0.16);
      display: flex; align-items: center; justify-content: center; margin: 0 auto 22px;
    }
    .check svg { width: 42px; height: 42px; }
    h1 { font-size: 22px; margin: 0 0 8px; font-weight: 700; }
    p { margin: 0; color: #A9A4C7; font-size: 14px; line-height: 1.5; }
    .muted { margin-top: 18px; font-size: 12px; color: #6f6a8d; }
    a.btn {
      display: inline-block; margin-top: 22px; padding: 10px 18px; border-radius: 10px;
      background: #7B39FC; color: #fff; text-decoration: none; font-weight: 600; font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div class="check">
      <svg viewBox="0 0 24 24" fill="none" stroke="#36D37A" stroke-width="2.5"
           stroke-linecap="round" stroke-linejoin="round"><path d="M20 6 9 17l-5-5"/></svg>
    </div>
    <h1>You're signed in</h1>
    <p>SuperIsland is finishing up. You can close this tab and head back to the app.</p>
    <a class="btn" id="open" href="#">Open SuperIsland</a>
    <p class="muted">Returning to SuperIsland…</p>
  </div>
  <script>
    (function () {
      var qs = window.location.search || "";
      var hash = window.location.hash || "";
      // PKCE returns ?code=…; forward whichever payload is present to the app.
      var deeplink = "superisland://auth-callback" + (qs || hash);
      var raw = (qs || hash).replace(/^[?#]/, "");
      var params = new URLSearchParams(raw);
      if (params.get("error")) {
        document.getElementById("card").innerHTML =
          '<h1>Sign-in failed</h1><p>' +
          (params.get("error_description") || params.get("error")) +
          '</p><p class="muted">Close this tab and try again in SuperIsland.</p>';
        return;
      }
      document.getElementById("open").setAttribute("href", deeplink);
      window.location.replace(deeplink);       // hand the code to the app
      setTimeout(function () { try { window.close(); } catch (e) {} }, 800);
    })();
  </script>
</body>
</html>
