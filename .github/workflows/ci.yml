name: CI
on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Assert Swift 6 toolchain
        run: |
          swift --version
          swift --version | grep -q "Swift version 6" || { echo "Expected Swift 6.x"; exit 1; }

      - name: Cache SwiftPM build
        uses: actions/cache@v4
        with:
          path: .build
          key: spm-${{ runner.os }}-${{ hashFiles('Package.resolved', 'Package.swift') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Build (release)
        run: swift build -c release

      - name: Test
        run: swift test

      - name: SwiftLint
        run: |
          curl -sL https://github.com/realm/SwiftLint/releases/download/0.64.0/portable_swiftlint.zip -o /tmp/swiftlint.zip
          unzip -q -o /tmp/swiftlint.zip -d /tmp/swiftlint
          /tmp/swiftlint/swiftlint lint --strict --quiet

      - name: Format check
        run: swift format lint --strict --configuration .swift-format --recursive Sources Tests

      - name: Signing dry-run (ad-hoc, no secrets)
        env:
          SUPERISLAND_SIGN_IDENTITY: "-"
        run: |
          Scripts/build-app.sh release
          codesign --verify --deep --strict --verbose=2 .build/SuperIsland.app
